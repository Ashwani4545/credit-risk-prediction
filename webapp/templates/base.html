<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AegisBank{% endblock %} — AI Risk Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    {% block head %}{% endblock %}
  </head>
  <body>
    <!-- ── NAV ─────────────────────────────────────────────────────────────── -->
    <nav class="nav" id="mainNav">
      <a class="nav-brand" href="/">
        <div class="nav-logo"><span>A</span></div>
        <span class="nav-name">AegisBank</span>
      </a>

      <ul class="nav-links">
        <li>
          <a
            href="/"
            class="{% if request.endpoint=='index' %}active{% endif %}"
            >Assessment</a
          >
        </li>
        <li>
          <a
            href="/dashboard"
            class="{% if request.endpoint=='dashboard' %}active{% endif %}"
            >Dashboard</a
          >
        </li>
        <li>
          <a
            href="/history"
            class="{% if request.endpoint=='history' %}active{% endif %}"
            >History</a
          >
        </li>
        <li>
          <a
            href="/reports"
            class="{% if request.endpoint=='reports' %}active{% endif %}"
            >Reports</a
          >
        </li>
      </ul>

      <div class="nav-right">
        <span class="nav-tag">v2.4 · XGBoost</span>
      </div>
    </nav>
    <!-- ────────────────────────────────────────────────────────────────────── -->

    <div class="page-root">{% block content %}{% endblock %}</div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
